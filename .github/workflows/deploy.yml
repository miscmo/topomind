name: Deploy to GitHub Pages
# 已禁用：项目为纯 Electron 桌面端，无 Web 端，部署 GitHub Pages 会导致页面崩溃
# on:
#   push:
#     branches: [ main ]
#   workflow_dispatch:
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: '此项目为 Electron 专用，Web 端不可用。确认强制部署请填 yes'
        required: true
        default: 'no'

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
